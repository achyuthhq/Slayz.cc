services:
  - type: web
    name: slayz-cc
    env: node
    buildCommand: rm -rf node_modules dist .vite-cache && npm ci && npm run build
    startCommand: cross-env NODE_ENV=production node dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: RENDER
        value: true
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /api/health 