services:
  - type: web
    name: slayz-cc
    env: node
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /api/health 